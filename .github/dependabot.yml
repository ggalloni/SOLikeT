version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    # Group GitHub Actions updates into smaller logical groups so PRs are
    # easier to review. Adjust patterns to taste.
    groups:
      actions-all:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    # Groups aligned with sections in pyproject.toml
    groups:
      python-core-runtime:
        patterns:
          - "requests"
          - "scipy"
          - "cobaya"
          - "sacc"
          - "camb"
          - "getdist"
          - "numpy"
          - "astropy"
          - "pandas"
      python-emulator:
        patterns:
          - "cosmopower"
          - "tensorflow*"
          - "tensorflow-probability"
      python-pyccl:
        patterns:
          - "pyccl"
      python-pyhalomodel:
        patterns:
          - "pyhalomodel"
      python-mflike:
        patterns:
          - "mflike"
          - "fgspectra"
          - "syslibrary"
      python-dev-docs:
        patterns:
          - "sphinx"
          - "sphinx-rtd-theme"
          - "pytest"
          - "pytest-cov"
          - "ruff"
          - "scikit-learn"
          - "pre-commit"
